site_name: Mentat
site_description: AI-native prediction markets on Solana, resolved by zkTLS proofs.
site_url: https://docs.cryptuon.com/mentat/
site_author: Cryptuon Research
copyright: "© 2026 Cryptuon Research"

repo_url: https://github.com/cryptuon/mentat
repo_name: cryptuon/mentat
edit_uri: edit/main/documentation/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search

extra:
  homepage: https://mentat.cryptuon.com/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cryptuon/mentat
      name: Mentat on GitHub
    - icon: fontawesome/solid/globe
      link: https://www.cryptuon.com
      name: Cryptuon Research

